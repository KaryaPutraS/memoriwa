services:
  api:
    build: .
    container_name: wa-dashboard-api-1
    ports:
      - "127.0.0.1:8002:8000"
    env_file: .env
    environment:
      - DATA_FILE=/data/state.json
    volumes:
      - wa_data:/data
    restart: unless-stopped
    networks:
      - app-net

  waha:
    image: devlikeapro/waha:latest
    container_name: wa-dashboard-waha-1
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - waha_sessions:/app/.sessions
    environment:
      - WAHA_API_KEY=${WAHA_API_KEY:?WAHA_API_KEY must be set in .env}
      - WAHA_PRINT_QR=false
      # NOWEB = protocol-level engine without headless Chromium (lighter)
      - WHATSAPP_DEFAULT_ENGINE=NOWEB
    restart: unless-stopped
    networks:
      - app-net
    mem_limit: 1g
    memswap_limit: 2g

networks:
  app-net:
    driver: bridge

volumes:
  waha_sessions:
  wa_data:
