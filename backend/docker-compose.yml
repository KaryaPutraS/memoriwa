services:
  api:
    build: .
    ports:
      - "8002:8000"
    environment:
      - ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173}
      - WAHA_URL=http://waha:3000
      - WAHA_API_KEY=${WAHA_API_KEY:-}
      - MEMORIWA_WEBHOOK_URL=${MEMORIWA_WEBHOOK_URL:-http://43.156.71.166:8082/webhook/waha}
    restart: unless-stopped
    depends_on:
      - waha
  
  waha:
    image: devlikeapro/waha:latest
    ports:
      - "3000:3000"
    environment:
      - WAHA_API_KEY=${WAHA_API_KEY:-memoriwa-waha-key-change-me}
      - WAHA_DASHBOARD_USERNAME=admin
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD:-memoriwa123}
    volumes:
      - waha_sessions:/app/.sessions
    restart: unless-stopped

volumes:
  waha_sessions:
