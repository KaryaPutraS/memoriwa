# MemoriWA — one-command stack: waha + api + web (nginx)
# Managed by install.sh — configuration comes from the .env file next to it.

services:
  waha:
    image: devlikeapro/waha:latest
    restart: unless-stopped
    environment:
      WAHA_API_KEY: ${WAHA_API_KEY:?WAHA_API_KEY must be set}
    volumes:
      - waha_sessions:/app/.sessions
    networks: [app-net]
    deploy:
      resources:
        limits:
          memory: 1G

  api:
    build: ./backend
    restart: unless-stopped
    environment:
      ENV: production
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?WEBHOOK_SECRET must be set}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      CORS_ORIGINS: ${PUBLIC_URL:?PUBLIC_URL must be set}
      WAHA_URL: http://waha:3000
      WAHA_API_KEY: ${WAHA_API_KEY:?WAHA_API_KEY must be set}
      # WAHA reaches the webhook INSIDE the docker network — the webhook
      # endpoint itself never needs to be exposed to the internet.
      MEMORIWA_WEBHOOK_URL: http://api:8000/webhook/waha
      DATA_FILE: /data/state.json
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ENABLE_DOCS: "false"
    volumes:
      - app_data:/data
    depends_on: [waha]
    networks: [app-net]

  web:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on: [api]
    networks: [app-net]

volumes:
  waha_sessions:
  app_data:

networks:
  app-net:
